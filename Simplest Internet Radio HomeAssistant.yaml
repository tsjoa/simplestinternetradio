substitutions:
  id_prefix: esp32-stereo-link
  friendly_name: "Stereo Internet Radio"

ota:
  platform: esphome
  password: !secret ota_password

esphome:
  name: ${id_prefix}
  friendly_name: ${friendly_name}
  comment: "ESP32-S3: Internet Radio Streamer"

esp32:
  board: esp32-s3-devkitm-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_SPIRAM: y
      CONFIG_SPIRAM_BOOT_INIT: y
      CONFIG_SPIRAM_USE_MALLOC: y
      CONFIG_SPIRAM_TYPE_AUTO: y

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${friendly_name}
    password: !secret ap_password
    ap_timeout: 15s

api:
  encryption:
    key: !secret api_encryption_key

web_server:
  port: 80

logger:

# -------------------------------------------------------------------
# DIGITAL AUDIO (I2S) PIPELINE CONFIGURATION
# -------------------------------------------------------------------
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO5     # Wired to LCK (LRCK)
    i2s_bclk_pin: GPIO7      # Wired to BCK

speaker:
  - platform: i2s_audio
    id: stereo_dac
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO6      # Wired to DIN
    dac_type: external
    i2s_comm_fmt: i2s_msb
    channel: stereo
    buffer_duration: 500ms   # Leverages internal 2MB PSRAM allocation heap

# -------------------------------------------------------------------
# HOME ASSISTANT MEDIA PLAYER ENTITY
# -------------------------------------------------------------------
media_player:
  - platform: speaker
    name: ${friendly_name}
    id: media_streamer       
    announcement_pipeline:
      speaker: stereo_dac
